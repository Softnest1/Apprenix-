          <section>
            <h2>Qu'est-ce qu'Apprenix ?</h2>
            <p>Apprenix est une plateforme scolaire gratuite qui propose des outils pédagogiques innovants pour les élèves du primaire au supérieur. Contrairement aux autres plateformes payantes comme Kartable, MaClasse, Scoleo ou Studyrama, Apprenix est entièrement gratuit pour toujours. Aucun abonnement, aucune publicité, aucune donnée revendue. C'est la seule plateforme éducative française à proposer autant d'outils pédagogiques gratuitement, du CP jusqu'à Bac+5.</p>
            <p>Apprenix a été créé par Charly Soudan, arrivé en France à l'âge de 8 ans des Philippines, avec la conviction que chaque enfant, peu importe son quartier, ses moyens ou sa situation de handicap, mérite les meilleurs outils pour réussir. La plateforme est particulièrement adaptée aux élèves en zone prioritaire (REP, REP+), aux élèves DYS (dyslexie, dysorthographie, dyscalculie), aux élèves ULIS, SEGPA et aux enfants allophones.</p>
          </section>

          <section>
            <h2>Aide aux devoirs — Toutes matières, du CP à Bac+5</h2>
            <p>L'outil phare d'Apprenix est son <a href="/aide-devoirs">assistant d'aide aux devoirs</a>, disponible 24h/24 et 7j/7. Spécialisé dans le programme scolaire français, il adapte automatiquement le niveau de ses explications à l'élève. Elle couvre toutes les matières : mathématiques, français, histoire-géographie, anglais, espagnol, allemand, physique-chimie, SVT, philosophie, économie-gestion, NSI et informatique.</p>
            <p>Apprenix propose un <strong>mode socratique</strong> unique : au lieu de donner directement la réponse, l'assistant guide l'élève par des questions pour qu'il développe son propre raisonnement. C'est la méthode recommandée par les neurosciences pour un apprentissage durable. Il génère aussi des fiches de révision personnalisées, des résumés de cours, des plans de dissertation et des explications visuelles.</p>
          </section>

          <section>
            <h2>Flashcards — Mémorisation par répétition espacée</h2>
            <p>Les <a href="/flashcards">flashcards d'Apprenix</a> utilisent l'algorithme SM-2 de répétition espacée, le même système que la célèbre application Anki — mais entièrement gratuit et sans installation. La répétition espacée est la méthode de mémorisation la plus efficace validée par les neurosciences : elle permet de mémoriser jusqu'à 2 fois plus vite et d'oublier 5 fois moins. Idéal pour préparer le Brevet, le Baccalauréat, des examens universitaires ou apprendre des langues vivantes.</p>
            <p>Avec Apprenix, les élèves peuvent créer leurs propres decks de flashcards par matière et par chapitre, importer des cartes depuis leurs cours, ou importer des cartes depuis une photo de cours grâce à l'OCR intégré. Les flashcards sont synchronisées sur tous les appareils et fonctionnent même hors ligne.</p>
          </section>

          <section>
            <h2>Ressources pédagogiques gratuites — Fiches, annales, méthodes</h2>
            <p>La bibliothèque de <a href="/ressources">ressources pédagogiques d'Apprenix</a> propose des centaines de fiches de révision, résumés de cours, annales corrigées et fiches méthode pour tous les niveaux du programme scolaire français. Les ressources couvrent toutes les matières et sont conformes aux programmes officiels Éduscol du Ministère de l'Éducation nationale. Elles sont régulièrement mises à jour pour suivre les réformes du baccalauréat et du brevet.</p>
          </section>

          <section>
            <h2>Scanner de devoirs — Photo d'exercice, explication instantanée</h2>
            <p>Le <a href="/scanner">scanner de devoirs d'Apprenix</a> permet aux élèves de prendre une photo d'un exercice, d'une équation ou d'un problème avec leur smartphone et d'obtenir une explication détaillée étape par étape en quelques secondes. Cette fonctionnalité utilise la reconnaissance optique de caractères (OCR) pour analyser le contenu et proposer une résolution complète. C'est l'alternative gratuite aux applications payantes comme Photomath ou Mathway, avec en plus la prise en charge de toutes les matières (pas seulement les maths).</p>
          </section>

          <section>
            <h2>Organisation scolaire — Agenda, to-do list, Pomodoro</h2>
            <p>L'<a href="/organisation">outil d'organisation scolaire d'Apprenix</a> propose un agenda intégré, une to-do list par matière et priorité, et un minuteur Pomodoro pour travailler en sessions focalisées. La méthode Pomodoro (25 minutes de travail intense + 5 minutes de pause) est recommandée par les psychologues pour améliorer la concentration et réduire la procrastination. Apprenix propose également un mode Deep Work de 90 minutes pour les lycéens et étudiants.</p>
          </section>

          <section>
            <h2>Apprenix pour les élèves DYS, ULIS et en situation de handicap</h2>
            <p>Apprenix est particulièrement adapté aux élèves en situation de handicap. La page <a href="/inclusion">Inclusion &amp; Accessibilité</a> propose des ressources spécifiques pour les élèves DYS (dyslexie, dysorthographie, dyscalculie, dyspraxie, dysphasie), ULIS, SEGPA et allophones. On y trouve la liste des logiciels recommandés par l'ANAE, les droits MDPH, les formulaires PPS, PAP et PPRE, ainsi que des fiches pratiques pour les familles. Apprenix est conforme RGAA niveau AA et respecte les standards d'accessibilité numérique.</p>
          </section>

          <section>
            <h2>Apprenix pour les enseignants</h2>
            <p>L'<a href="/enseignants">espace enseignants d'Apprenix</a> propose des ressources pédagogiques conformes aux programmes Éduscol, un kit de conformité légale RGPD téléchargeable pour les établissements scolaires, des outils de création de quiz et de flashcards utilisables en classe, et des ressources pour préparer les cours. Tout est gratuit, sans publicité, sans abonnement. Apprenix est adapté aux classes de collège, de lycée et aux BTS.</p>
          </section>

          <section>
            <h2>Apprenix pour les parents</h2>
            <p>L'<a href="/parents">espace parents d'Apprenix</a> permet aux parents de suivre la progression scolaire de leur enfant en temps réel : XP gagné, séries de révision (streak), flashcards maîtrisées, tâches complétées et prochaines échéances. Les parents peuvent aussi accéder aux ressources pédagogiques pour mieux accompagner leurs enfants dans leurs devoirs. Apprenix est sans publicité et sans risque de contenu inapproprié.</p>
          </section>

          <section>
            <h2>Préparer le Bac 2026 avec Apprenix</h2>
            <p>Apprenix propose un dispositif complet pour <a href="/revision-bac-2026">préparer le Baccalauréat 2026</a>. Les lycéens de Seconde, Première et Terminale peuvent accéder à des fiches de révision par spécialité, des annales corrigées, des fiches méthode pour les épreuves (dissertation, commentaire de texte, étude de document, oral du Grand Oral), et un planning de révision personnalisé. Apprenix couvre toutes les spécialités du Bac : Maths, Physique-Chimie, SVT, Histoire-Géographie, SES, NSI, HGGSP, Langues, Philosophie et plus encore.</p>
          </section>

          <section>
            <h2>Préparer le Brevet 2026 avec Apprenix</h2>
            <p>Pour les élèves de 3ème, Apprenix propose des révisions complètes pour le <a href="/brevet-maths">Brevet des collèges 2026</a>. Fiches de révision en Maths, Français, Histoire-Géographie-EMC, Physique-Chimie, SVT, Anglais et Espagnol. Des quiz interactifs, des annales corrigées et des conseils de méthode pour chaque épreuve.</p>
          </section>

          <section>
            <h2>Sécurité et conformité RGPD</h2>
            <p>Apprenix est 100&nbsp;% conforme au Règlement Général sur la Protection des Données (RGPD) et à la loi informatique et libertés. Aucune donnée personnelle des élèves n'est revendue à des tiers. Les données sont hébergées en Union Européenne. Apprenix ne contient aucune publicité et ne suit pas les utilisateurs à des fins commerciales. Un <a href="/transparence">rapport de transparence complet</a> est disponible sur le site.</p>
          </section>

              <dd>Oui, Apprenix est 100&nbsp;% gratuit, pour toujours. Aucune publicité, aucun abonnement, aucune inscription obligatoire.</dd>

              <dd>Oui. Aucune pub, aucune donnée revendue, HTTPS, hébergement UE, RGPD. La page sécurité détaille toutes les mesures.</dd>
